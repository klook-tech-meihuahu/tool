

<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klook DevToolkit</title>
  <link rel="icon" type="image/png" href="https://klook-tech-meihuahu.github.io/tool/logo.png">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/node-sql-parser@4.8.0/umd/mysql.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.7.2/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/state-local@1.0.6/lib/umd/state-local.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@monaco-editor/loader@1.0.1/lib/umd/monaco-loader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@monaco-editor/react@4.0.11/lib/umd/monaco-react.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-html.min.js"></script>

  <style>
    /* 自定义亮色系滚动条 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f8fafc;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    /* 隐藏未编译的 React 代码，防止页面闪烁 */
    script[type="text/babel"] {
      display: none;
    }
    body {
      margin: 0;
      padding: 0;
    }

    .md-content h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; color: #1f2937; }
    .md-content h2 { font-size: 1.25rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #374151; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.25rem;}
    .md-content h3 { font-size: 1.125rem; font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; color: #4b5563; }
    .md-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #4b5563; }
    .md-content li { margin-bottom: 0.25rem; }
    .md-content code { background-color: #f3f4f6; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.875em; color: #ea580c; }
    .md-content pre { background-color: #1f2937; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
    .md-content pre code { background-color: transparent; color: #e5e7eb; padding: 0; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased selection:bg-orange-200">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- 实用工具函数 ---

    const copyToClipboard = (text, onSuccess, onError) => {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(onSuccess).catch(onError);
      } else {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-999999px";
        textArea.style.top = "-999999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          onSuccess();
        } catch (err) {
          onError();
        }
        textArea.remove();
      }
    };

    const generateJavaClass = (jsonStr, rootClassName = "RootEntity") => {
      let obj;
      try {
        obj = JSON.parse(jsonStr);
      } catch (e) {
        throw new Error("无效的 JSON 格式，请检查后再试");
      }

      const classes = {};
      const capitalize = (s) => s.charAt(0).toUpperCase() + s.slice(1);

      const parseObject = (name, data) => {
        if (data === null) return "Object";
        if (Array.isArray(data)) {
          if (data.length === 0) return "List<Object>";
          const itemType = parseObject(name.endsWith('s') ? name.slice(0, -1) : name + "Item", data[0]);
          return `List<${itemType}>`;
        }
        if (typeof data === "object") {
          let fields = "";
          let className = capitalize(name);
          for (const key in data) {
            const type = parseObject(key, data[key]);
            fields += `    private ${type} ${key};\n`;
          }
          let classDef = `public class ${className} {\n\n${fields}\n    // 省略 Getter 和 Setter\n}`;
          classes[className] = classDef;
          return className;
        }
        if (typeof data === "string") return "String";
        if (typeof data === "number") return Number.isInteger(data) ? "Integer" : "Double";
        if (typeof data === "boolean") return "Boolean";
        return "Object";
      };

      parseObject(rootClassName, obj);
      const imports = "import java.util.List;\n\n";
      return imports + Object.values(classes).join("\n\n");
    };

    const formatXml = (xml) => {
      let formatted = '';
      let pad = 0;
      let tempXml = xml.replace(/(>)(<)(\/*)/g, '$1\n$2$3');
      tempXml.split('\n').forEach((line) => {
        let indent = 0;
        if (line.match(/.+<\/\w[^>]*>$/)) {
          indent = 0;
        } else if (line.match(/^<\/\w/)) {
          if (pad !== 0) pad -= 1;
        } else if (line.match(/^<\w[^>]*[^\/]>.*$/)) {
          indent = 1;
        } else {
          indent = 0;
        }
        formatted += '  '.repeat(pad) + line + '\n';
        pad += indent;
      });
      return formatted.trim();
    };

    const minifyXml = (xml) => {
      return xml.replace(/>\s+</g, '><').replace(/\r?\n|\r/g, '').trim();
    };

    const computeDiff = (oldStr, newStr, type = 'json') => {
      try {
        let linesA, linesB;
        if (type === 'json') {
          linesA = JSON.stringify(JSON.parse(oldStr), null, 2).split('\n');
          linesB = JSON.stringify(JSON.parse(newStr), null, 2).split('\n');
        } else if (type === 'xml') {
          linesA = formatXml(oldStr).split('\n');
          linesB = formatXml(newStr).split('\n');
        } else {
          linesA = oldStr.split('\n');
          linesB = newStr.split('\n');
        }
        
        if (linesA.length * linesB.length > 4000000) {
          return [{ type: 'error', value: '数据过大，无法进行精细对比' }];
        }

        const m = linesA.length, n = linesB.length;
        const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
        
        for (let i = 1; i <= m; i++) {
          for (let j = 1; j <= n; j++) {
            if (linesA[i - 1] === linesB[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
            else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
          }
        }
        
        let i = m, j = n;
        const result = [];
        while (i > 0 || j > 0) {
          if (i > 0 && j > 0 && linesA[i - 1] === linesB[j - 1]) {
            result.unshift({ type: 'unchanged', value: linesA[i - 1] });
            i--; j--;
          } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
            result.unshift({ type: 'added', value: linesB[j - 1] });
            j--;
          } else if (i > 0 && (j === 0 || dp[i][j - 1] < dp[i - 1][j])) {
            result.unshift({ type: 'removed', value: linesA[i - 1] });
            i--;
          }
        }
        return result;
      } catch (e) {
        return [{ type: 'error', value: '解析失败，请确保两边格式正确' }];
      }
    };


    // --- UI 组件 ---

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 2500);
        return () => clearTimeout(timer);
      }, [onClose]);

      const bgColors = {
        success: 'bg-green-100 border-green-400 text-green-800',
        error: 'bg-red-100 border-red-400 text-red-800',
        info: 'bg-orange-100 border-orange-400 text-orange-800'
      };
      
      const icons = {
        success: 'fa-circle-check text-green-600',
        error: 'fa-circle-exclamation text-red-600',
        info: 'fa-circle-info text-orange-600'
      };

      return (
        <div className={`fixed bottom-6 right-6 flex items-center px-4 py-3 rounded-lg border shadow-lg transition-all z-50 ${bgColors[type] || bgColors.info}`}>
          <i className={`fas ${icons[type] || icons.info} text-lg mr-2`}></i>
          <span className="text-sm font-medium">{message}</span>
        </div>
      );
    };

    const Button = ({ onClick, children, variant = 'primary', icon, className = "", isActive = false, title }) => {
      const baseStyle = "flex items-center justify-center px-4 py-2 text-sm font-medium rounded-md transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 shadow-sm";
      const variants = {
        primary: "bg-orange-500 hover:bg-orange-600 text-white focus:ring-orange-500 border border-orange-500",
        secondary: "bg-white hover:bg-gray-50 text-gray-700 focus:ring-gray-200 border border-gray-300",
        danger: "bg-red-50 hover:bg-red-100 text-red-600 focus:ring-red-200 border border-red-200",
        outline: "bg-transparent hover:bg-gray-100 text-gray-600 focus:ring-gray-200 border border-gray-300",
      };

      const activeStyles = isActive 
        ? "ring-2 ring-offset-1 ring-orange-500 shadow-md transform scale-[0.98] !border-orange-500" + (variant === 'secondary' ? " bg-orange-50 text-orange-700" : "")
        : "";

      return (
        <button title={title} onClick={onClick} className={`${baseStyle} ${variants[variant]} ${activeStyles} ${className}`}>
          {icon && <i className={`fas fa-${icon} mr-2`}></i>}
          {children}
        </button>
      );
    };

    const Panel = ({ label, extraAction, children }) => (
      <div className="flex flex-col h-full bg-white rounded-lg border border-gray-200 overflow-hidden shadow-sm">
        <div className="flex justify-between items-center px-4 py-2 bg-gray-50 border-b border-gray-200 shrink-0">
          <span className="text-xs font-semibold text-gray-500 uppercase tracking-wider">{label}</span>
          <div className="flex gap-2 items-center">
            {extraAction}
          </div>
        </div>
        <div className="flex-1 relative min-h-0 bg-white">
           {children}
        </div>
      </div>
    );

    const TextAreaPanel = ({ label, value, onChange, placeholder, readOnly = false, extraAction = null }) => (
      <Panel label={label} extraAction={extraAction}>
        <textarea
          className="absolute inset-0 w-full h-full bg-transparent text-gray-800 p-4 font-mono text-sm resize-none focus:outline-none focus:ring-inset focus:ring-2 focus:ring-orange-500 custom-scrollbar"
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          readOnly={readOnly}
          spellCheck="false"
        />
      </Panel>
    );

    // --- JSON 树状视图组件 ---
    const JsonNode = ({ nodeKey, value, isLast, expandSignal, depth = 0 }) => {
      const [expanded, setExpanded] = useState(depth < 3);

      useEffect(() => {
        if (!expandSignal) return;
        if (expandSignal.startsWith('expand')) setExpanded(true);
        if (expandSignal.startsWith('collapse')) setExpanded(false);
      }, [expandSignal]);

      const isObject = value !== null && typeof value === 'object';
      const isArray = Array.isArray(value);
      const isEmpty = isObject && Object.keys(value).length === 0;
      
      const toggle = (e) => {
          e.stopPropagation();
          setExpanded(!expanded);
      };

      if (!isObject) {
        let valueElement;
        if (value === null) valueElement = <span className="text-gray-400 font-bold">null</span>;
        else if (typeof value === 'string') valueElement = <span className="text-green-600 break-all">"{value}"</span>;
        else if (typeof value === 'boolean') valueElement = <span className="text-pink-600 font-bold">{value ? 'true' : 'false'}</span>;
        else valueElement = <span className="text-teal-600">{String(value)}</span>;

        return (
          <div className="flex items-start font-mono text-sm leading-6 hover:bg-gray-50/50 rounded px-1 transition-colors">
            <div className="w-5 shrink-0"></div>
            <div className="flex-1">
              {nodeKey !== null && <span className="text-orange-600 mr-1 font-semibold break-all">"{nodeKey}":</span>}
              {valueElement}
              {!isLast && <span className="text-gray-500">,</span>}
            </div>
          </div>
        );
      }

      const brackets = isArray ? ['[', ']'] : ['{', '}'];

      return (
        <div className="flex flex-col font-mono text-sm leading-6">
          <div className="flex items-start hover:bg-gray-50/50 rounded px-1 transition-colors -ml-1">
            <div className="w-5 shrink-0 flex items-center justify-center mt-1 cursor-pointer" onClick={toggle}>
              {!isEmpty && (
                <i className={`fas fa-caret-${expanded ? 'down' : 'right'} text-gray-400 hover:text-gray-600 transition-transform`}></i>
              )}
            </div>
            <div className="flex-1">
              <span className="cursor-pointer select-none" onClick={toggle}>
                {nodeKey !== null && <span className="text-orange-600 mr-1 font-semibold break-all">"{nodeKey}":</span>}
                <span className="text-gray-600">{brackets[0]}</span>
                {!expanded && !isEmpty && (
                  <span className="text-gray-500 mx-1 bg-gray-100 px-1.5 py-0.5 rounded text-xs border border-gray-200 hover:bg-orange-50 hover:text-orange-600 transition-colors">
                    ...
                  </span>
                )}
                {!expanded && !isEmpty && <span className="text-gray-600">{brackets[1]}</span>}
                {!expanded && !isEmpty && !isLast && <span className="text-gray-500">,</span>}
              </span>
              {!expanded && !isEmpty && (
                 <span className="text-gray-400 text-xs ml-2 italic select-none">
                   {isArray ? `${value.length} 个元素` : `${Object.keys(value).length} 个属性`}
                 </span>
              )}
            </div>
          </div>
          
          {expanded && !isEmpty && (
            <div className="flex group">
              <div className="w-2.5 shrink-0 border-r border-gray-200 border-dashed group-hover:border-orange-400 cursor-pointer transition-colors" title="点击折叠此段落" onClick={toggle}></div>
              <div className="flex-1 overflow-hidden ml-2.5">
                {Object.keys(value).map((k, i, arr) => (
                  <JsonNode 
                    key={k} 
                    nodeKey={isArray ? null : k} 
                    value={value[k]} 
                    isLast={i === arr.length - 1} 
                    expandSignal={expandSignal}
                    depth={depth + 1}
                  />
                ))}
              </div>
            </div>
          )}
          
          {expanded && !isEmpty && (
            <div className="flex items-start px-1">
              <div className="w-5 shrink-0"></div>
              <div className="flex-1">
                <span className="text-gray-600">{brackets[1]}</span>
                {!isLast && <span className="text-gray-500">,</span>}
              </div>
            </div>
          )}
        </div>
      );
    };

    const JsonViewer = ({ data, expandSignal }) => {
       return (
         <div className="p-4 pb-12 w-full">
            <JsonNode nodeKey={null} value={data} isLast={true} expandSignal={expandSignal} depth={0} />
         </div>
       );
    };


    // --- 核心功能模块 ---

    // [原来的 JSON、XML、SQL、Diff 等模块保持不变，直接跳到新增正则和组合处]
    // ... 为了保持完整性，这里保留完整的代码输出 ...

    const JsonToolkit = ({ showToast }) => {
      const [input, setInput] = useState('');
      const [output, setOutput] = useState('');
      const [activeAction, setActiveAction] = useState('format');
      const [parsedJson, setParsedJson] = useState(null);
      const [expandSignal, setExpandSignal] = useState('');

      useEffect(() => {
        if (!input.trim()) {
          setOutput('');
          setParsedJson(null);
          return;
        }
        try {
          let res = '';
          setParsedJson(null);
          switch (activeAction) {
            case 'format':
              const obj = JSON.parse(input);
              res = JSON.stringify(obj, null, 4);
              setParsedJson(obj);
              break;
            case 'minify':
              res = JSON.stringify(JSON.parse(input));
              break;
            case 'escape':
              res = JSON.stringify(input).slice(1, -1);
              break;
            case 'unescape':
              let unescaped = input;
              if (unescaped.startsWith('"') && unescaped.endsWith('"')) {
                 unescaped = JSON.parse(unescaped);
              } else {
                 unescaped = JSON.parse(`"${unescaped}"`);
              }
              try { res = JSON.stringify(JSON.parse(unescaped), null, 4); } 
              catch(e) { res = unescaped; }
              break;
            default: break;
          }
          setOutput(res);
        } catch (err) {
          setOutput(`// 解析失败: ${err.message}\n// 请检查 JSON 格式是否正确...`);
        }
      }, [input, activeAction]);

      const handleActionClick = (action) => {
        setActiveAction(action);
        if (input.trim()) showToast(`已切换至: ${action}`, "success");
      };

      return (
        <div className="flex flex-col h-full space-y-4">
          <div className="flex flex-wrap gap-3 p-1">
            <Button isActive={activeAction === 'format'} onClick={() => handleActionClick('format')} icon="align-left">格式化 (Beautify)</Button>
            <Button isActive={activeAction === 'minify'} onClick={() => handleActionClick('minify')} icon="compress" variant="secondary">压缩 (Minify)</Button>
            <Button isActive={activeAction === 'escape'} onClick={() => handleActionClick('escape')} icon="arrow-right-arrow-left" variant="secondary">转义 (Escape)</Button>
            <Button isActive={activeAction === 'unescape'} onClick={() => handleActionClick('unescape')} icon="layer-group" variant="secondary">去转义 (Unescape)</Button>
            <div className="flex-1"></div>
            <Button onClick={() => setInput('{\n  "demo": true,\n  "message": "Hello World",\n  "data": {\n    "users": [{"id": 1, "name": "Alice"}, {"id": 2, "name": "Bob"}],\n    "settings": {\n       "theme": "dark",\n       "notifications": true\n    }\n  }\n}')} variant="outline" icon="code">填入示例</Button>
            <Button onClick={() => { setInput(''); setOutput(''); setParsedJson(null); }} variant="danger" icon="trash-can">清空</Button>
          </div>

          <div className="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 min-h-0">
            <TextAreaPanel label="输入区 (Input)" value={input} onChange={(e) => setInput(e.target.value)} placeholder="粘贴您的 JSON 字符串到这里，将自动处理..." />
            
            <Panel 
              label="输出区 (Output)" 
              extraAction={
                <>
                  {activeAction === 'format' && parsedJson !== null && (
                    <div className="flex border border-gray-200 rounded overflow-hidden mr-2 shadow-sm">
                      <button onClick={() => setExpandSignal(`expand_${Date.now()}`)} className="px-2 py-1 text-xs bg-white text-gray-600 hover:bg-orange-50 hover:text-orange-600 transition-colors border-r border-gray-200" title="展开全部树节点">
                        <i className="fas fa-folder-open mr-1"></i>展开全部
                      </button>
                      <button onClick={() => setExpandSignal(`collapse_${Date.now()}`)} className="px-2 py-1 text-xs bg-white text-gray-600 hover:bg-orange-50 hover:text-orange-600 transition-colors" title="折叠全部树节点">
                        <i className="fas fa-folder mr-1"></i>折叠全部
                      </button>
                    </div>
                  )}
                  <button onClick={() => copyToClipboard(output, () => showToast("复制纯文本成功", "success"), () => showToast("复制失败", "error"))} className="text-gray-400 hover:text-orange-600 transition-colors" title="复制格式化后的代码">
                    <i className="fas fa-copy"></i>
                  </button>
                </>
              }
            >
              {activeAction === 'format' && parsedJson !== null ? (
                <div className="absolute inset-0 overflow-auto custom-scrollbar">
                   <JsonViewer data={parsedJson} expandSignal={expandSignal} />
                </div>
              ) : (
                <textarea
                  className="absolute inset-0 w-full h-full bg-transparent text-gray-800 p-4 font-mono text-sm resize-none focus:outline-none custom-scrollbar focus:ring-inset focus:ring-2 focus:ring-orange-500"
                  value={output}
                  readOnly
                  placeholder="处理后的结果会显示在这里..."
                  spellCheck="false"
                />
              )}
            </Panel>

          </div>
        </div>
      );
    };

    const XmlToolkit = ({ showToast }) => {
      const [input, setInput] = useState('');
      const [output, setOutput] = useState('');
      const [activeAction, setActiveAction] = useState('format');

      useEffect(() => {
        if (!input.trim()) {
          setOutput('');
          return;
        }
        try {
          let res = '';
          if (activeAction === 'format') {
            res = formatXml(input);
          } else if (activeAction === 'minify') {
            res = minifyXml(input);
          }
          setOutput(res);
        } catch (err) {
          setOutput(``);
        }
      }, [input, activeAction]);

      const handleActionClick = (action) => {
        setActiveAction(action);
        if (input.trim()) showToast(`已切换至: ${action}`, "success");
      };

      return (
        <div className="flex flex-col h-full space-y-4">
          <div className="flex flex-wrap gap-3 p-1">
            <Button isActive={activeAction === 'format'} onClick={() => handleActionClick('format')} icon="align-left">格式化 (Beautify)</Button>
            <Button isActive={activeAction === 'minify'} onClick={() => handleActionClick('minify')} icon="compress" variant="secondary">压缩 (Minify)</Button>
            <div className="flex-1"></div>
            <Button onClick={() => setInput('<note>\n<to>Tove</to>\n<from>Jani</from>\n<body>Don\'t forget me this weekend!</body>\n</note>')} variant="outline" icon="code">填入示例</Button>
            <Button onClick={() => { setInput(''); setOutput(''); }} variant="danger" icon="trash-can">清空</Button>
          </div>

          <div className="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 min-h-0">
            <TextAreaPanel label="XML 输入区 (Input)" value={input} onChange={(e) => setInput(e.target.value)} placeholder="粘贴您的 XML 字符串到这里，将自动处理..." />
            <TextAreaPanel 
              label="XML 输出区 (Output)" 
              value={output} 
              readOnly 
              placeholder="处理后的结果会显示在这里..."
              extraAction={
                <button onClick={() => copyToClipboard(output, () => showToast("复制成功", "success"), () => showToast("复制失败", "error"))} className="text-gray-400 hover:text-orange-600 transition-colors" title="复制结果">
                  <i className="fas fa-copy"></i>
                </button>
              }
            />
          </div>
        </div>
      );
    };

    const SqlValidator = ({ showToast }) => {

          setResult({

            message: err.message,

         if (!result.location || !input) return '';
         const lines = input.split('\n');

    const DiffTool = ({ showToast, mode = 'json' }) => {
      const [leftText, setLeftText] = useState('');
      const [rightText, setRightText] = useState('');
      const [diffRows, setDiffRows] = useState(null);
      const [diffStats, setDiffStats] = useState(null);
      const [isComparing, setIsComparing] = useState(false);
      const containerRef = useRef(null);

      const titleA = mode === 'json' ? '原始 JSON (A)' : '原始 XML (A)';
      const titleB = mode === 'json' ? '修改后 JSON (B)' : '修改后 XML (B)';
      const modeName = mode === 'json' ? 'JSON' : 'XML';

      const handleCompare = () => {
        if (!leftText.trim() || !rightText.trim()) {
          showToast(`请在两边都输入 ${modeName} 内容`, "error");
          return;
        }
        const result = computeDiff(leftText, rightText, mode);
        if (result.length > 0 && result[0].type === 'error') {
            showToast(result[0].value, "error");
            return;
        }

        const rows = [];
        let i = 0;
        let leftLineNum = 1;
        let rightLineNum = 1;

        let additions = 0;
        let deletions = 0;
        let modifications = 0;

        while (i < result.length) {
            const current = result[i];
            if (current.type === 'unchanged') {
                rows.push({ 
                    left: current, right: current, 
                    leftNum: leftLineNum++, rightNum: rightLineNum++ 
                });
                i++;
            } else if (current.type === 'removed') {
                if (i + 1 < result.length && result[i+1].type === 'added') {
                    rows.push({ 
                        left: current, right: result[i+1],
                        leftNum: leftLineNum++, rightNum: rightLineNum++
                    });
                    modifications++;
                    i += 2;
                } else {
                    rows.push({ 
                        left: current, right: null,
                        leftNum: leftLineNum++, rightNum: ''
                    });
                    deletions++;
                    i++;
                }
            } else if (current.type === 'added') {
                rows.push({ 
                    left: null, right: current,
                    leftNum: '', rightNum: rightLineNum++
                });
                additions++;
                i++;
            }
        }
        
        setDiffRows(rows);
        setDiffStats({ added: additions, removed: deletions, modified: modifications, total: additions + deletions + modifications });
        setIsComparing(true);
      };

      const handleMinimapClick = (e) => {
        if (!containerRef.current) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const y = e.clientY - rect.top;
        const percentage = y / rect.height;
        containerRef.current.scrollTop = (containerRef.current.scrollHeight * percentage) - (containerRef.current.clientHeight / 2);
      };

      return (
        <div className="flex flex-col h-full space-y-4">
          <div className="flex items-center gap-3 bg-white p-3 rounded-lg border border-gray-200 shadow-sm shrink-0">
            {!isComparing ? (
                <>
                    <Button onClick={handleCompare} icon="code-compare" variant="primary">开始智能对比</Button>
                    <p className="text-gray-500 text-sm ml-4 flex-1">支持智能格式化后对比，将为您展示直观的左右分栏视图。</p>
                    <Button onClick={() => { setLeftText(''); setRightText(''); setDiffRows(null); setDiffStats(null); }} variant="danger" icon="trash-can">清空</Button>
                </>
            ) : (
                <>
                    <Button onClick={() => setIsComparing(false)} icon="arrow-left" variant="secondary">返回编辑</Button>
                    
                    {diffStats && diffStats.total === 0 ? (
                        <div className="text-sm ml-4 flex-1 flex items-center text-green-600 font-semibold bg-green-50 px-3 py-1.5 rounded-md border border-green-200 w-max">
                            <i className="fas fa-circle-check mr-2"></i> 两个文件完全一致！
                        </div>
                    ) : (
                        <div className="text-sm ml-4 flex-1 flex items-center flex-wrap gap-2">
                            <span className="font-semibold text-gray-700">发现 {diffStats?.total} 处差异：</span>
                            {diffStats?.added > 0 && <span className="px-2 py-0.5 bg-green-100 text-green-700 rounded text-xs border border-green-200">新增 {diffStats.added} 行</span>}
                            {diffStats?.removed > 0 && <span className="px-2 py-0.5 bg-red-100 text-red-700 rounded text-xs border border-red-200">删除 {diffStats.removed} 行</span>}
                            {diffStats?.modified > 0 && <span className="px-2 py-0.5 bg-orange-100 text-orange-700 rounded text-xs border border-orange-200">修改 {diffStats.modified} 行</span>}
                            
                            <span className="text-gray-400 ml-4 flex items-center text-xs">
                                <i className="fas fa-hand-pointer mr-1"></i> 提示：可点击最右侧导航条快速跳转
                            </span>
                        </div>
                    )}
                </>
            )}
          </div>

          {!isComparing ? (
            <div className="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 min-h-[300px]">
              <TextAreaPanel label={titleA} value={leftText} onChange={(e) => setLeftText(e.target.value)} placeholder={`输入旧的 ${modeName}...`} />
              <TextAreaPanel label={titleB} value={rightText} onChange={(e) => setRightText(e.target.value)} placeholder={`输入新的 ${modeName}...`} />
            </div>
          ) : (
            <div className="flex-1 relative flex bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm min-h-[300px]">
              <div ref={containerRef} className="flex-1 overflow-auto custom-scrollbar scroll-smooth">
                <div className="min-w-[800px] w-full flex flex-col font-mono text-sm">
                    <div className="flex sticky top-0 bg-gray-100 border-b border-gray-300 shadow-sm z-10 text-gray-600 font-semibold text-xs uppercase tracking-wider">
                        <div className="w-1/2 flex px-4 py-2 border-r border-gray-300">{titleA}</div>
                        <div className="w-1/2 flex px-4 py-2">{titleB}</div>
                    </div>
                    
                    {diffRows.map((row, idx) => (
                        <div key={idx} className="flex border-b border-gray-100/50 last:border-0 hover:bg-gray-50/80 transition-colors">
                            <div className={`w-1/2 flex border-r border-gray-200 ${row.left?.type === 'removed' ? 'bg-red-50 text-red-800' : 'text-gray-700'}`}>
                                <div className="w-12 shrink-0 bg-gray-50 border-r border-gray-200 text-right pr-2 py-1 text-xs text-gray-400 select-none">
                                    {row.leftNum}
                                </div>
                                <div className="px-3 py-1 whitespace-pre overflow-hidden text-ellipsis flex-1">
                                    {row.left ? row.left.value : ' '}
                                </div>
                            </div>
                            <div className={`w-1/2 flex ${row.right?.type === 'added' ? 'bg-green-50 text-green-800' : 'text-gray-700'}`}>
                                <div className="w-12 shrink-0 bg-gray-50 border-r border-gray-200 text-right pr-2 py-1 text-xs text-gray-400 select-none">
                                    {row.rightNum}
                                </div>
                                <div className="px-3 py-1 whitespace-pre overflow-hidden text-ellipsis flex-1">
                                    {row.right ? row.right.value : ' '}
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
              </div>

              <div 
                  className="w-4 bg-gray-50 border-l border-gray-200 shrink-0 relative cursor-pointer hover:bg-gray-200 transition-colors z-10"
                  onClick={handleMinimapClick}
                  title="点击快速跳转至差异位置"
              >
                  {diffRows.map((row, idx) => {
                      const isLeftRemoved = row.left?.type === 'removed';
                      const isRightAdded = row.right?.type === 'added';
                      
                      if (!isLeftRemoved && !isRightAdded) return null;

                      let bgColor = '';
                      if (isLeftRemoved && isRightAdded) bgColor = 'bg-orange-400';
                      else if (isLeftRemoved) bgColor = 'bg-red-400';
                      else if (isRightAdded) bgColor = 'bg-green-400';

                      return (
                          <div 
                              key={idx}
                              className={`absolute w-full opacity-80 ${bgColor}`}
                              style={{ 
                                  top: `${(idx / diffRows.length) * 100}%`,
                                  height: `${Math.max(1, 100 / diffRows.length)}%`,
                                  minHeight: '3px'
                              }}
                          />
                      );
                  })}
              </div>
            </div>
          )}
        </div>
      );
    };

    const JsonDiff = ({ showToast }) => <DiffTool showToast={showToast} mode="json" />;
    const XmlDiff = ({ showToast }) => <DiffTool showToast={showToast} mode="xml" />;

    const GitBranchGenerator = ({ showToast }) => {
        const [branchType, setBranchType] = useState('release');
        const [reqId, setReqId] = useState('');
        const [moduleName, setModuleName] = useState('');
        const [releaseSeq, setReleaseSeq] = useState('01');
        
        const [windowOffset, setWindowOffset] = useState(0);

        const fallbackRandomId = useMemo(() => Math.floor(Math.random() * 100000000).toString().padStart(8, '0'), []);

        const getYYYYMMDD = () => {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}${month}${day}`;
        };

        const getTargetReleaseInfo = () => {
            const now = new Date();
            const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay(); 
            
            let daysToAdd = 0;
            if (dayOfWeek <= 2) {
                daysToAdd = 2 - dayOfWeek;
            } else if (dayOfWeek <= 4) {
                daysToAdd = 4 - dayOfWeek;
            } else {
                daysToAdd = 9 - dayOfWeek;
            }

            const targetDate = new Date(now);
            targetDate.setDate(targetDate.getDate() + daysToAdd); 

            let offset = windowOffset;
            while (offset > 0) {
                if (targetDate.getDay() === 2) targetDate.setDate(targetDate.getDate() + 2); 
                else targetDate.setDate(targetDate.getDate() + 5); 
                offset--;
            }
            while (offset < 0) {
                if (targetDate.getDay() === 4) targetDate.setDate(targetDate.getDate() - 2); 
                else targetDate.setDate(targetDate.getDate() - 5); 
                offset++;
            }

            const targetDayStr = targetDate.getDay() === 2 ? '02' : '04';
            const displayDate = `${targetDate.getFullYear()}-${String(targetDate.getMonth() + 1).padStart(2, '0')}-${String(targetDate.getDate()).padStart(2, '0')} (周${targetDate.getDay() === 2 ? '二' : '四'})`;

            const d = new Date(Date.UTC(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            const year = d.getUTCFullYear();

            return { 
                year, 
                week: weekNo.toString().padStart(2, '0'), 
                dayStr: targetDayStr,
                displayDate 
            };
        };


        const formatModuleName = (name) => {
            return name.trim().toLowerCase().replace(/[\s_]+/g, '-');
        };

        const generatedBranch = useMemo(() => {
            if (branchType === 'release') {
                const { year, week, dayStr } = getTargetReleaseInfo();
                return `release/${year}.w${week}.${dayStr}-${releaseSeq}`;
            } else {
                const finalReqId = reqId.trim() || fallbackRandomId;
                const finalModule = formatModuleName(moduleName);
                const modulePart = finalModule ? `-${finalModule}` : '';
                return `${branchType}/${finalReqId}${modulePart}-${getYYYYMMDD()}`;
            }
        }, [branchType, reqId, moduleName, releaseSeq, fallbackRandomId, windowOffset]);

        return (
            <div className="flex flex-col items-center justify-center h-full max-w-4xl mx-auto w-full pt-8">

                            <div className="relative">

                                    onChange={(e) => setBranchType(e.target.value)}
                                >
                                    <option value="feature">✨ feature (新功能开发)</option>
                                    <option value="hotfix">🚑 hotfix (紧急线上修复)</option>
                                    <option value="bugfix">🐛 bugfix (测试阶段缺陷修复)</option>
                                    <option value="release">📦 release (发版候选分支)</option>
                                    <option value="refactor">♻️ refactor (代码重构)</option>
                                </select>
                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                    <i className="fas fa-chevron-down text-sm"></i>
                                </div>
                            </div>
                        </div>

                        {branchType !== 'release' ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in">
                                <div className="flex flex-col space-y-2">
                                    <label className="text-sm font-semibold text-gray-700 flex justify-between">
                                        需求 / 缺陷编号 
                                        <span className="text-gray-400 font-normal text-xs">(选填)</span>

                                        value={reqId}

                                        placeholder="例如: User Login API"

    const DevTools = ({ showToast }) => {
  const [input, setInput] = useState('');
  const [output, setOutput] = useState('');
  const [activeTool, setActiveTool] = useState('url2json'); // 默认选中

  // 1. 去掉了 useCallback，变成普通的箭头函数
  // 注意：这里接收 textInput 作为参数，确保拿到的是最新的输入值
  const processText = async (type, textInput) => {
    if (!textInput && type !== 'uuid') {
        setOutput('');
        return;
    }

    try {
      let res = '';
      switch (type) {
        case 'url2json':
          const urlStr = textInput.trim();
          const queryString = urlStr.includes('?') ? urlStr.split('?')[1] : urlStr;
          const params = new URLSearchParams(queryString);
          const obj = {};
          for (const [key, value] of params.entries()) {
            obj[key] = value;
          }
          if (Object.keys(obj).length === 0) throw new Error("未解析到任何参数");
          res = JSON.stringify(obj, null, 4);
          break;
        case 'json2url':
          const jsonObj = JSON.parse(textInput);
          if (typeof jsonObj !== 'object' || jsonObj === null) throw new Error("输入必须是 JSON 对象");
          const urlParams = new URLSearchParams();
          for (const key in jsonObj) {
            if (jsonObj.hasOwnProperty(key)) {
              const val = typeof jsonObj[key] === 'object' ? JSON.stringify(jsonObj[key]) : jsonObj[key];
              urlParams.append(key, val);
            }
          }
          res = urlParams.toString();
          break;
        case 'jwt':
          const parts = textInput.trim().split('.');
          if (parts.length !== 3) throw new Error("无效的 JWT 格式");
          const base64UrlToB64 = (str) => str.replace(/-/g, '+').replace(/_/g, '/');
          const header = JSON.parse(decodeURIComponent(escape(atob(base64UrlToB64(parts[0])))));
          const payload = JSON.parse(decodeURIComponent(escape(atob(base64UrlToB64(parts[1])))));
          res = JSON.stringify({ header, payload }, null, 4);
          break;
        case 'timestamp2date':
          const tsStr = textInput.trim();
          let ts = Number(tsStr);
          if (isNaN(ts)) throw new Error("请输入有效的时间戳数字");
          if (tsStr.length <= 10) ts *= 1000;
          const dateObj = new Date(ts);
          if (isNaN(dateObj.getTime())) throw new Error("无效的时间戳");
          res = `本地时间: ${dateObj.toLocaleString()}\nUTC时间: ${dateObj.toUTCString()}\nISO格式: ${dateObj.toISOString()}`;
          break;
        case 'date2timestamp':
          const d = new Date(textInput.trim());
          if (isNaN(d.getTime())) throw new Error("请输入有效的日期字符串 (如: 2024-01-01 12:00:00)");
          res = `毫秒时间戳 (ms): ${d.getTime()}\n秒时间戳 (s): ${Math.floor(d.getTime() / 1000)}`;
          break;
        case 'b64encode': 
          res = btoa(unescape(encodeURIComponent(textInput))); 
          break;
        case 'b64decode': 
          res = decodeURIComponent(escape(atob(textInput))); 
          break;
        case 'urlencode': 
          res = encodeURIComponent(textInput); 
          break;
        case 'urldecode': 
          res = decodeURIComponent(textInput); 
          break;
        case 'uuid':
          let newUuid = '';
          if (crypto.randomUUID) {
            newUuid = crypto.randomUUID();
          } else {
            newUuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
              const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
              return v.toString(16);
            });
          }
          res = textInput ? textInput + '\n' + newUuid : newUuid; 
          break;
        case 'sha256':
          if (!window.isSecureContext && window.location.protocol !== 'file:') {
             throw new Error("SHA-256 需要在 HTTPS 或本地环境下运行");
          }
          const msgBuffer = new TextEncoder().encode(textInput);
          const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          res = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
          break;
        default: break;
      }
      setOutput(res);
    } catch (e) {
      setOutput(`等待输入正确格式... (${e.message})`);
    }
  };

  // 2. 按钮点击事件：手动调用 processText
  const handleToolClick = (type) => {
    setActiveTool(type);
    processText(type, input);
    
    // 如果是点击生成 UUID，给个提示
    if (type === 'uuid') {
      showToast("已生成新的 UUID", "success");
    }
  };

  // 3. 输入框改变事件：手动调用 processText（实现实时转换）
  const handleInputChange = (e) => {
    const newVal = e.target.value;
    setInput(newVal);
    // 直接把 newVal 传进去，不需要等 setInput 的异步更新
    processText(activeTool, newVal);
  };

  const getVariant = (type) => activeTool === type ? 'primary' : 'outline';

  return (
    <div className="flex flex-col h-full space-y-4 max-w-5xl mx-auto w-full">
      
      <div className="bg-white p-4 rounded-lg border border-gray-200 shadow-sm shrink-0">
        <div className="flex flex-wrap gap-2 items-center">
          <Button onClick={() => handleToolClick('url2json')} variant={getVariant('url2json')} icon="link">URL 转 JSON</Button>
          <Button onClick={() => handleToolClick('json2url')} variant={getVariant('json2url')} icon="code">JSON 转 URL</Button>
          <Button onClick={() => handleToolClick('jwt')} variant={getVariant('jwt')} icon="key">JWT 解码</Button>
          <Button onClick={() => handleToolClick('timestamp2date')} variant={getVariant('timestamp2date')} icon="clock">时间戳转日期</Button>
          <Button onClick={() => handleToolClick('date2timestamp')} variant={getVariant('date2timestamp')} icon="calendar">日期转时间戳</Button>
          <Button onClick={() => handleToolClick('uuid')} variant={getVariant('uuid')} icon="fingerprint">生成 UUID</Button>
          <Button onClick={() => handleToolClick('sha256')} variant={getVariant('sha256')} icon="shield-halved">SHA-256 哈希</Button>
          <Button onClick={() => handleToolClick('b64encode')} variant={getVariant('b64encode')}>Base64 编码</Button>
          <Button onClick={() => handleToolClick('b64decode')} variant={getVariant('b64decode')}>Base64 解码</Button>
          <Button onClick={() => handleToolClick('urlencode')} variant={getVariant('urlencode')}>URL 编码</Button>
          <Button onClick={() => handleToolClick('urldecode')} variant={getVariant('urldecode')}>URL 解码</Button>
          
          <Button 
            onClick={() => { setInput(''); setOutput(''); }} 
            variant="danger" 
            icon="trash-can" 
            className="ml-auto"
          >
            清空输入
          </Button>
        </div>
      </div>

      <div className="flex flex-col space-y-4 flex-1 min-h-0">
        <div className="flex-1">
          <TextAreaPanel 
            label="待处理文本 / 输入区" 
            value={input} 
            onChange={handleInputChange} // 使用新的 handleInputChange
            placeholder="实时处理输入内容 (例如: 1704067200000 或 a=1&b=2)" 
            extraAction={
              <button onClick={() => { setInput(output); processText(activeTool, output); }} className="text-xs text-orange-600 hover:bg-orange-50 border border-orange-200 px-2 py-1 rounded transition-colors" title="将结果内容移动到输入区">
                <i className="fas fa-arrow-up mr-1"></i>结果上移
              </button>
            }
          />
        </div>
        
        <div className="flex justify-center items-center py-1">
          <div className="w-8 h-8 rounded-full bg-white border border-gray-200 shadow-sm flex items-center justify-center">
            <i className="fas fa-arrow-down text-gray-400"></i>
          </div>
        </div>
        
        <div className="flex-1">
          <TextAreaPanel 
            label="处理结果 / 输出区" 
            value={output} 
            readOnly 
            placeholder="计算/解析的结果将实时显示在这里..." 
            extraAction={
              <button onClick={() => window.copyToClipboard && window.copyToClipboard(output, () => showToast("复制成功", "success"), () => showToast("复制失败", "error"))} className="text-gray-400 hover:text-orange-600 transition-colors">
                <i className="fas fa-copy"></i>
              </button>
            }
          />
        </div>
      </div>
    </div>
  );
};

    // ==========================================
    // --- 新增/升级：进阶版文本批量编辑替换工具 ---
    // ==========================================
    
    // 采用更健壮的防弹获取方式，兼容不同版本的导出结构
    const getMonacoEditor = () => {
      if (!window.monaco_react) return null;
      // 依次尝试获取 default 导出、命名导出或对象本身
      return window.monaco_react.default || window.monaco_react.Editor || window.monaco_react;

    const MonacoEditor = getMonacoEditor();

const TextReplacer = ({ showToast }) => {
  // 统一使用全局解构出的 hooks
  const [input, setInput] = useState('');
  const [output, setOutput] = useState('');
  const [findStr, setFindStr] = useState('\\n');
  const [replaceStr, setReplaceStr] = useState(',');
  const [useRegex, setUseRegex] = useState(true);

  const [mode, setMode] = useState('edit'); 
  const [language, setLanguage] = useState('javascript'); 
  const [splitRatio, setSplitRatio] = useState(50); 

  const inputEditorRef = useRef(null);
  const containerRef = useRef(null);

  // 1. 处理替换逻辑 (生成输出)
  useEffect(() => {
    if (!input) {
      setOutput('');
      return;
    }
    try {
      const actualReplace = replaceStr.replace(/\\n/g, '\n').replace(/\\t/g, '\t');
      const actualFind = findStr.replace(/\\n/g, '\n').replace(/\\t/g, '\t');
      
      if (!actualFind) {
         setOutput(input);
         return;
      }

      if (useRegex) {
        const regex = new RegExp(actualFind, 'g');
        setOutput(input.replace(regex, actualReplace));
      } else {
        setOutput(input.split(actualFind).join(actualReplace));
      }
    } catch (e) {
      setOutput(`// 表达式或替换规则错误: ${e.message}`);
    }
  }, [input, findStr, replaceStr, useRegex]);

  // 2. Monaco Editor 挂载事件
  const handleEditorDidMount = (editor, monaco) => {
    inputEditorRef.current = editor;
  };

  // 3. 一键格式化代码 
// 3. 终极一键格式化 (采用 Chrome 同款 js-beautify 引擎)
  const formatCode = () => {
    if (!inputEditorRef.current) return;
    
    const unformattedText = inputEditorRef.current.getValue();
    if (!unformattedText.trim()) return;

    try {
      let formattedText = unformattedText;

      // 如果没有加载 js-beautify，则回退到 Monaco 原生格式化
      if (typeof window.html_beautify === 'undefined' || typeof window.js_beautify === 'undefined') {
          inputEditorRef.current.getAction('editor.action.formatDocument').run();
          if (showToast) showToast("已应用基础格式化", "success");
          return;
      }

      // 针对不同语言调用对应的 beautify 引擎
      if (language === 'html' || language === 'xml') {
          // HTML 格式化：保持原生标签结构，不乱加空格
          formattedText = window.html_beautify(unformattedText, {
              indent_size: 2,
              preserve_newlines: true,
              max_preserve_newlines: 2,
              wrap_line_length: 0, // 0表示无限长，坚决不强制把长文本换行！(解决正则被截断的问题)
              indent_inner_html: true,
          });
      } else if (language === 'javascript' || language === 'json') {
          // JS/JSON 格式化：开启 e4x 魔法，完美支持 JSX
          formattedText = window.js_beautify(unformattedText, {
              indent_size: 2,
              preserve_newlines: true,
              max_preserve_newlines: 2,
              e4x: true, // 核心魔法：允许在 JS 中完美嵌套 XML/JSX
              space_in_empty_paren: false,
              wrap_line_length: 0, // 禁止自动截断超长代码(保护长字符串和正则)
          });
      } else {
          inputEditorRef.current.getAction('editor.action.formatDocument').run();
          if (showToast) showToast("已应用基础格式化", "success");
          return;
      }

      // 将完美格式化后的代码写回编辑器
      inputEditorRef.current.setValue(formattedText);
      if (showToast) showToast("已应用 Chrome 级智能格式化", "success");
      
    } catch (e) {
      console.error(e);
      if (showToast) showToast(`格式化失败：${e.message}`, "error");
    }
  };

  // 4. 拖拽调整窗口大小逻辑
  const handleDrag = (e) => {
    e.preventDefault();
    const container = containerRef.current;
    if (!container) return;

    const onMouseMove = (moveEvent) => {
      const containerRect = container.getBoundingClientRect();
      const newWidth = moveEvent.clientX - containerRect.left;
      const newRatio = (newWidth / containerRect.width) * 100;
      if (newRatio > 20 && newRatio < 80) {
        setSplitRatio(newRatio);
      }
    };

    const onMouseUp = () => {
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      window.dispatchEvent(new Event('resize')); // 触发重绘
    };

    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  };

  const applyPreset = (presetFind, presetReplace, isRegex = true) => {
    setFindStr(presetFind);
    setReplaceStr(presetReplace);
    setUseRegex(isRegex);
    if (showToast) showToast("已应用预设规则", "success");
  };

  // 兜底 UI：如果 CDN 失败导致没拿到编辑器组件
  if (!MonacoEditor) {
    return (
      <div className="flex flex-col items-center justify-center h-full text-gray-500 bg-white rounded-lg border border-gray-200 p-8">
        <i className="fas fa-triangle-exclamation text-4xl text-orange-400 mb-4"></i>
        <p>高级编辑器核心库加载失败，请检查网络或刷新页面重试。</p>
      </div>
    );
  }

  return (
    <div className="flex flex-col h-full space-y-4 bg-gray-50 p-4 rounded-xl">
      {/* 顶部工具栏 */}
      <div className="flex flex-wrap items-center justify-between gap-3 bg-white p-3 rounded-lg border border-gray-200 shadow-sm shrink-0">
        <div className="flex items-center gap-2">
           <span className="text-gray-600 text-sm font-medium mr-1">
               <i className="fas fa-magic text-purple-500 mr-1"></i> 快捷操作:
           </span>
           <button onClick={() => applyPreset('\\n', ',')} className="px-3 py-1.5 text-xs border rounded-full hover:bg-gray-100 transition-colors">换行 转 逗号</button>
           <button onClick={() => applyPreset('"', "'", false)} className="px-3 py-1.5 text-xs border rounded-full hover:bg-gray-100 transition-colors">双转单引号</button>
           
           <div className="h-4 w-px bg-gray-300 mx-2"></div>
           
           <select 
             className="text-sm border border-gray-300 rounded-md focus:ring-purple-500 focus:border-purple-500 py-1 pl-2 pr-6 outline-none"
             value={language}
             onChange={(e) => setLanguage(e.target.value)}
           >
             <option value="json">JSON</option>
             <option value="html">HTML</option>
             <option value="javascript">JavaScript</option>
             <option value="xml">XML</option>
             <option value="plaintext">纯文本</option>
           </select>

           <button onClick={formatCode} className="px-3 py-1.5 text-xs bg-blue-50 text-blue-600 border border-blue-200 rounded hover:bg-blue-100 transition-colors flex items-center gap-1">
             <i className="fas fa-align-left"></i> 一键格式化
           </button>
        </div>

        <div className="flex items-center gap-2">
           <div className="flex bg-gray-100 p-1 rounded-lg border border-gray-200">
             <button 
               onClick={() => setMode('edit')} 
               className={`px-4 py-1.5 text-xs rounded-md font-medium transition-all ${mode === 'edit' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'}`}
             >
               全屏编辑
             </button>
             <button 
               onClick={() => setMode('replace')} 
               className={`px-4 py-1.5 text-xs rounded-md font-medium transition-all ${mode === 'replace' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'}`}
             >
               分屏替换
             </button>
           </div>
           <button onClick={() => { setInput(''); setOutput(''); }} className="px-3 py-1.5 text-xs bg-red-50 text-red-600 border border-red-200 rounded hover:bg-red-100 transition-colors">
             <i className="fas fa-trash-can mr-1"></i>清空
           </button>
        </div>
      </div>

      {/* 查找与替换控制面板 (仅在替换模式显示) */}
      <div className={`flex flex-col sm:flex-row items-stretch sm:items-center gap-4 bg-white p-3 rounded-lg border border-gray-200 shadow-sm shrink-0 transition-all duration-300 ${mode === 'edit' ? 'hidden' : 'flex'}`}>
        <div className="flex items-center gap-2 flex-1">
          <span className="text-sm font-semibold text-gray-600 shrink-0 border-r border-gray-200 pr-2">查找目标</span>
          <input
            type="text"
            className="w-full bg-gray-50 border border-gray-300 px-3 py-2 rounded-lg font-mono text-sm outline-none focus:ring-2 focus:ring-purple-500 transition-shadow"
            value={findStr}
            onChange={(e) => setFindStr(e.target.value)}
            placeholder="例如: \n"
            spellCheck="false"
          />
        </div>
        <div className="flex items-center gap-2 flex-1">
          <span className="text-sm font-semibold text-gray-600 shrink-0 border-r border-gray-200 pr-2">替换为</span>
          <input
            type="text"
            className="w-full bg-gray-50 border border-gray-300 px-3 py-2 rounded-lg font-mono text-sm outline-none focus:ring-2 focus:ring-purple-500 transition-shadow"
            value={replaceStr}
            onChange={(e) => setReplaceStr(e.target.value)}
            spellCheck="false"
          />
        </div>
        <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer font-medium select-none bg-gray-50 px-3 py-2 rounded-lg border border-gray-200">
          <input type="checkbox" checked={useRegex} onChange={(e) => setUseRegex(e.target.checked)} className="w-4 h-4 text-purple-600 rounded" />
          正则匹配
        </label>
      </div>

      {/* 编辑器核心区域 */}
      <div ref={containerRef} className="flex-1 flex w-full h-full min-h-[450px] border border-gray-200 rounded-lg overflow-hidden shadow-sm bg-white">
        
        {/* 左侧：输入/编辑区 */}
        <div style={{ width: mode === 'edit' ? '100%' : `${splitRatio}%` }} className="flex flex-col h-full transition-all duration-300 ease-in-out relative">
          <div className="bg-gray-100 px-3 py-1.5 border-b border-gray-200 text-xs font-semibold text-gray-500 flex justify-between items-center shrink-0">
             <span>源文本 (按 Ctrl+F / Cmd+F 搜索代码)</span>
          </div>
          <div className="flex-1 w-full relative">
            <MonacoEditor
              height="100%"
              language={language}
              value={input}
              onChange={(value) => setInput(value || '')}
              onMount={handleEditorDidMount}
              theme="light"
              options={{
                minimap: { enabled: false }, 
                wordWrap: 'on',
                folding: true, 
                lineNumbersMinChars: 3,
                scrollBeyondLastLine: false, 
                automaticLayout: true, 
                fontSize: 14,
              }}
            />
          </div>
        </div>

        {/* 拖拽分割线 */}
        {mode === 'replace' && (
          <div 
            onMouseDown={handleDrag}
            className="w-3 bg-gray-50 hover:bg-purple-100 cursor-col-resize flex flex-col justify-center items-center transition-colors shrink-0 z-10 border-x border-gray-200 group"
            title="拖拽调整比例"
          >
            <div className="w-1 h-8 bg-gray-300 rounded-full group-hover:bg-purple-400 transition-colors"></div>
          </div>
        )}

        {/* 右侧：处理结果区 */}
        {mode === 'replace' && (
          <div style={{ width: `${100 - splitRatio}%` }} className="flex flex-col h-full bg-gray-50 transition-all duration-300 ease-in-out relative">
            <div className="bg-gray-100 px-3 py-1.5 border-b border-gray-200 text-xs font-semibold text-gray-500 flex justify-between items-center shrink-0">
               <span>处理结果</span>
               <button onClick={() => {
                 navigator.clipboard.writeText(output);
                 if (showToast) showToast("已复制到剪贴板", "success");
               }} className="text-purple-600 hover:text-purple-800 transition-colors">
                 <i className="fas fa-copy"></i> 复制
               </button>
            </div>
            <div className="flex-1 w-full relative">
              <MonacoEditor
                height="100%"
                language={language}
                value={output}
                theme="light"
                options={{
                  readOnly: true, 
                  minimap: { enabled: false },
                  wordWrap: 'on',
                  folding: true,
                  lineNumbersMinChars: 3,
                  scrollBeyondLastLine: false,
                  automaticLayout: true,
                  fontSize: 14,
                }}
              />
            </div>
          </div>
        )}

      </div>
    </div>
  );
};
    // ==========================================
    // --- 新增：正则表达式在线测试工具组件 ---
    // ==========================================
    const RegexTester = ({ showToast }) => {
      const [regexStr, setRegexStr] = useState('');
      const [flags, setFlags] = useState('g');
      const [testText, setTestText] = useState('在此输入需要匹配的文本...\n例如：我的邮箱是 meihua.hu@klook.com，电话是 13812345678。');
      const [matches, setMatches] = useState([]);
      const [error, setError] = useState(null);

      // 常用正则表达式集合
      const commonRegex = [
        { label: '邮箱', value: '([a-zA-Z0-9_\\-\\.]+)@([a-zA-Z0-9_\\-\\.]+)\\.([a-zA-Z]{2,5})' },
        { label: '手机号(中国)', value: '1[3-9]\\d{9}' },
        { label: '中文字符', value: '[\\u4e00-\\u9fa5]+' },
        { label: '身份证号(18位)', value: '[1-9]\\d{5}(18|19|20)\\d{2}((0[1-9])|(1[0-2]))(([0-2][1-9])|10|20|30|31)\\d{3}[0-9Xx]' },
        { label: 'URL网址', value: '(https?:\\/\\/)?([\\da-z\\.-]+)\\.([a-z\\.]{2,6})([\\/\\w \\.-]*)*\\/?' },
        { label: 'IP地址', value: '((2(5[0-5]|[0-4]\\d))|[0-1]?\\d{1,2})(\\.((2(5[0-5]|[0-4]\\d))|[0-1]?\\d{1,2})){3}' }
      ];

      // 处理正则表达式匹配的副作用
      useEffect(() => {
        if (!regexStr) {
          setMatches([]);
          setError(null);
          return;
        }

        try {
          const regex = new RegExp(regexStr, flags);
          setError(null);

          if (!testText) {
             setMatches([]);
             return;
          }

          if (flags.includes('g')) {
            // 全局匹配，使用 matchAll 获取所有匹配及捕获组
            const results = [...testText.matchAll(regex)];
            setMatches(results.map(r => ({ 
                text: r[0], 
                index: r.index,
                groups: r.length > 1 ? Array.from(r) : null // 提取捕获组
            })));
          } else {
            // 非全局匹配，使用 match 获取单个匹配及捕获组
            const result = testText.match(regex);
            if (result) {
              setMatches([{ 
                  text: result[0], 
                  index: result.index,
                  groups: result.length > 1 ? Array.from(result) : null 
              }]);
            } else {
              setMatches([]);
            }
          }
        } catch (e) {
          setError(e.message);
          setMatches([]);
        }
      }, [regexStr, flags, testText]);

      const toggleFlag = (flag) => {
        setFlags(prev => prev.includes(flag) ? prev.replace(flag, '') : prev + flag);
      };

      return (
        <div className="flex flex-col h-full space-y-4">
          
          {/* 常用正则快捷输入 */}
          <div className="flex flex-wrap items-center gap-3 bg-white p-3 rounded-lg border border-gray-200 shadow-sm shrink-0">
             <span className="text-gray-600 text-sm font-medium mr-1">
                 <i className="fas fa-bolt text-yellow-500 mr-1"></i> 常用正则:
             </span>
             {commonRegex.map(r => (
                 <Button key={r.label} variant="outline" onClick={() => setRegexStr(r.value)} className="!py-1.5 !px-3 !text-xs !rounded-full">
                     {r.label}
                 </Button>
             ))}
             <div className="flex-1"></div>
             <Button onClick={() => { setRegexStr(''); setTestText(''); }} variant="danger" icon="trash-can">清空</Button>
          </div>

          {/* 正则表达式控制面板 */}
          <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 bg-white p-3 rounded-lg border border-gray-200 shadow-sm shrink-0">
             <div className="text-gray-400 font-mono text-2xl pl-2 select-none">/</div>
             <input
                 type="text"
                 className="flex-1 bg-gray-50 border border-gray-300 text-gray-800 px-4 py-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 font-mono text-base"
                 placeholder="在此输入正则表达式，例如: \d+"
                 value={regexStr}
                 onChange={(e) => setRegexStr(e.target.value)}
                 spellCheck="false"
             />
             <div className="text-gray-400 font-mono text-2xl pr-2 select-none">/</div>
             
             {/* 修饰符修饰器 (Flags) */}
             <div className="flex items-center gap-1.5 bg-gray-50 p-1.5 rounded-lg border border-gray-200 select-none">
                 <button 
                     onClick={() => toggleFlag('g')} 
                     className={`px-3 py-1.5 rounded text-sm font-mono font-bold transition-colors ${flags.includes('g') ? 'bg-orange-500 text-white shadow' : 'text-gray-500 hover:bg-gray-200'}`} 
                     title="全局匹配 (Global match)"
                 >
                     g
                 </button>
                 <button 
                     onClick={() => toggleFlag('i')} 
                     className={`px-3 py-1.5 rounded text-sm font-mono font-bold transition-colors ${flags.includes('i') ? 'bg-orange-500 text-white shadow' : 'text-gray-500 hover:bg-gray-200'}`} 
                     title="忽略大小写 (Ignore case)"
                 >
                     i
                 </button>
                 <button 
                     onClick={() => toggleFlag('m')} 
                     className={`px-3 py-1.5 rounded text-sm font-mono font-bold transition-colors ${flags.includes('m') ? 'bg-orange-500 text-white shadow' : 'text-gray-500 hover:bg-gray-200'}`} 
                     title="多行匹配 (Multiline)"
                 >
                     m
                 </button>
             </div>
          </div>

          {/* 内容与结果区 */}
          <div className="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-4 min-h-[300px]">
             <TextAreaPanel 
                label="待匹配文本 (Test String)" 
                value={testText} 
                onChange={(e) => setTestText(e.target.value)} 
                placeholder="在此粘贴需要测试的源文本..." 
             />

             <Panel 
                label="匹配结果 (Match Result)" 
                extraAction={
                   <span className="text-xs text-gray-500 font-medium bg-gray-100 px-2 py-1 rounded border border-gray-200 shadow-inner">
                       共 {matches.length} 处匹配
                   </span>
                }
             >
                <div className="absolute inset-0 overflow-auto custom-scrollbar bg-gray-50 p-4">
                   {error ? (
                       <div className="flex items-center text-red-700 bg-red-100 border border-red-300 p-3 rounded-md mb-4 shadow-sm animate-fade-in">
                           <i className="fas fa-circle-xmark text-xl mr-3"></i>
                           <div>
                               <h3 className="font-bold text-sm">正则表达式语法错误</h3>
                               <p className="text-xs text-red-600 mt-0.5">{error}</p>
                           </div>
                       </div>
                   ) : !regexStr ? (
                       <div className="h-full flex flex-col items-center justify-center text-gray-400 animate-fade-in">
                           <i className="fas fa-spell-check text-4xl mb-3 opacity-50"></i>
                           <p>等待输入正则表达式进行测试...</p>
                       </div>
                   ) : matches.length > 0 ? (
                       <div className="space-y-3 animate-fade-in">
                           {matches.map((m, i) => (
                               <div key={i} className="bg-white border border-gray-200 rounded-md p-3 flex shadow-sm hover:border-orange-300 transition-colors">
                                   <div className="w-8 shrink-0 flex items-center justify-center font-bold text-gray-300 border-r border-gray-100 mr-3">
                                       {i + 1}
                                   </div>
                                   <div className="flex-1 min-w-0">
                                       <div className="text-sm text-green-700 font-mono break-all font-semibold">
                                           {m.text}
                                       </div>
                                       
                                       {/* 如果存在捕获组(Groups)，则渲染出组列表 */}
                                       {m.groups && m.groups.length > 1 && (
                                          <div className="mt-2 pt-2 border-t border-gray-100 flex flex-col gap-1.5">
                                              {m.groups.map((g, gi) => gi > 0 && g !== undefined && (
                                                  <div key={gi} className="text-xs flex items-start">
                                                      <span className="w-16 shrink-0 text-gray-400 font-medium">Group {gi}:</span>
                                                      <span className="text-gray-600 font-mono break-all bg-gray-50 px-1 rounded">{g}</span>
                                                  </div>
                                              ))}
                                          </div>
                                       )}
                                       
                                       <div className="text-[10px] text-gray-400 mt-2 flex justify-end tracking-wider">
                                           [INDEX: {m.index}]
                                       </div>
                                   </div>
                               </div>
                           ))}
                       </div>
                   ) : (
                       <div className="h-full flex flex-col items-center justify-center text-gray-400 animate-fade-in">
                           <i className="fas fa-ghost text-4xl mb-3 opacity-50"></i>
                           <p>当前表达式未能在文本中找到匹配项</p>
                       </div>
                   )}
                </div>
             </Panel>
          </div>
        </div>
      );
    };

    // --- 更新日志弹窗组件 (Fetch 远程文件版) ---
    const ChangelogModal = ({ isOpen, onClose }) => {
      const [content, setContent] = useState('加载中...');
      const [isError, setIsError] = useState(false);
      const githubUrl = "https://github.com/klook-tech-meihuahu/tool/tree/main"; 

      useEffect(() => {
        if (!isOpen) return;
        setIsError(false);
        setContent('<div class="flex items-center text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i> 正在加载更新日志...</div>');
        
        fetch('./README.md')
          .then(res => {
            if (!res.ok) throw new Error('File not found');
            return res.text();
          })
          .then(text => {
            if (window.marked) {
              setContent(window.marked.parse(text));
            } else {
              setContent('<p class="text-red-500">解析引擎未加载</p>');
            }
          })
          .catch(err => {
            setIsError(true);
            setContent(`
              <div class="text-center py-6">
                <i class="fas fa-file-circle-xmark text-4xl text-gray-300 mb-3"></i>
                <p class="text-gray-600 mb-4">加载更新日志失败，文件可能不存在。<br/><span class="text-xs text-gray-400">(请确保 CHANGELOG.md 文件已部署到服务器根目录)</span></p>
                <a href="${githubUrl}" target="_blank" class="inline-flex items-center justify-center px-4 py-2 bg-gray-800 hover:bg-gray-900 text-white text-sm font-medium rounded-md transition-colors">
                  <i class="fab fa-github mr-2"></i> 前往 GitHub 查看更新日志
                </a>
              </div>
            `);
          });
      }, [isOpen]);

      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm animate-fade-in p-4" onClick={onClose}>
          <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center px-6 py-4 border-b border-gray-200 shrink-0">
              <h2 className="text-xl font-bold text-gray-800 flex items-center">
                <i className="fas fa-timeline text-orange-500 mr-2"></i> 
                更新日志 (Changelog)
              </h2>
              <button onClick={onClose} className="text-gray-400 hover:text-red-500 transition-colors bg-gray-50 hover:bg-red-50 w-8 h-8 rounded-full flex items-center justify-center">
                <i className="fas fa-times text-lg"></i>
              </button>
            </div>
            <div 
              className={`p-6 overflow-y-auto custom-scrollbar flex-1 ${!isError ? 'md-content' : ''}`} 
              dangerouslySetInnerHTML={{ __html: content }}
            >
            </div>
          </div>
        </div>
      );
    };

    // --- 主应用组件 ---

    function App() {
      // 1. 将 'regex' 添加到有效路由列表中
      const validTabs = ['json', 'json-diff', 'xml', 'xml-diff', 'sql', 'java', 'git', 'regex', 'text-replace', 'tools', 'ref'];

      const getInitialTab = () => {
        const hash = window.location.hash.replace('#', '');
        return validTabs.includes(hash) ? hash : 'json';
      };

      const [activeTab, setActiveTab] = useState(getInitialTab);
      const [toast, setToast] = useState(null);
      const [isChangelogOpen, setIsChangelogOpen] = useState(false);

      const showToast = (message, type = 'info') => {
        setToast({ message, type, id: Date.now() });
      };

      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.replace('#', '');
          if (validTabs.includes(hash)) {
            setActiveTab(hash);
          }
        };

        window.addEventListener('hashchange', handleHashChange);
        if (!window.location.hash) {
           window.location.hash = activeTab;
        }

        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      const handleTabChange = (tabId) => {
         setActiveTab(tabId);
         window.location.hash = tabId;
      };

      const handleShareLink = () => {
         copyToClipboard(window.location.href, 
           () => showToast("专属链接已复制，快去分享吧！", "success"), 
           () => showToast("复制链接失败", "error")
         );
      };

      // 2. 将新增的正则表达式工具配置到左侧菜单中
      const tabs = [
        { id: 'json', label: 'JSON 全能工具', icon: 'file-code' },
        { id: 'json-diff', label: 'JSON 对比 (Diff)', icon: 'file-signature' },
        { id: 'xml', label: 'XML 全能工具', icon: 'file-lines' },
        { id: 'xml-diff', label: 'XML 对比 (Diff)', icon: 'code-compare' },
        { id: 'sql', label: 'SQL 语法校验', icon: 'database' },
        { id: 'java', label: 'JSON 转 Java', icon: 'layer-group' },
        { id: 'git', label: 'Git 分支生成器', icon: 'code-branch' },
        { id: 'regex', label: '正则表达式测试', icon: 'spell-check' },
        { id: 'text-replace', label: '代码编辑器', icon: 'wand-magic-sparkles' }, // <--- 新增这行
        { id: 'tools', label: '常用开发工具', icon: 'terminal' },
        { id: 'ref', label: '开发备忘录 (SQL/Redis)', icon: 'book-bookmark' },
      ];

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 flex flex-col md:flex-row font-sans">
          
          <aside className="w-full md:w-64 bg-white border-r border-gray-200 flex flex-col shrink-0 shadow-sm z-10">
           <div className="h-16 flex items-center px-6 border-b border-gray-200 shrink-0">
              <img src="./logo.png" 
                alt="Logo" 
                className="w-8 h-8 mr-3 object-contain rounded-lg shadow-sm" />
               <h1 className="font-bold text-lg text-gray-800 tracking-wide">Klook DevToolkit </h1>
          </div>
            
            <nav className="flex-1 overflow-y-auto py-4 px-3 space-y-1">
              {tabs.map((tab) => {
                const isActive = activeTab === tab.id;
                return (
                  <button
                    key={tab.id}
                    onClick={() => handleTabChange(tab.id)}
                    className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors duration-200 ${
                      isActive 
                        ? 'bg-orange-50 text-orange-700' 
                        : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'
                    }`}
                  >
                    <i className={`fas fa-${tab.icon} w-5 text-center mr-2 ${isActive ? 'text-orange-500' : 'text-gray-400'}`}></i>
                    {tab.label}
                  </button>
                );
              })}
            </nav>

            <div className="p-4 border-t border-gray-200 shrink-0 bg-gray-50/50 flex flex-col gap-3">
              <div className="flex items-center justify-between">
                <button 
                  onClick={() => setIsChangelogOpen(true)} 
                  className="text-xs font-semibold text-gray-500 hover:text-orange-600 transition-colors flex items-center"
                >
                  <i className="fas fa-book-journal-whills mr-1.5"></i> 版本历史
                </button>
                <a 
                  href="https://github.com/klook-tech-meihuahu/tool/tree/main"
                  target="_blank" 
                  className="text-xs font-semibold text-gray-500 hover:text-gray-900 transition-colors flex items-center"
                >
                  <i className="fab fa-github mr-1.5 text-sm"></i> GitHub
                </a>
              </div>
              <div className="flex items-center text-xs text-gray-400">
                <i className="fas fa-shield-halved mr-2 text-green-500"></i>
                <span>纯本地浏览器运算，保障数据安全</span>
              </div>
            </div>
          </aside>

          <main className="flex-1 flex flex-col min-w-0 h-screen overflow-hidden bg-gray-50">
            
            <header className="h-16 flex items-center justify-between px-6 border-b border-gray-200 shrink-0 bg-white shadow-sm z-0">
              <h2 className="text-xl font-semibold text-gray-800 flex items-center">
                {tabs.find(t => t.id === activeTab)?.label}
              </h2>
              <Button onClick={handleShareLink} icon="share-nodes" variant="secondary" className="!py-1.5 !px-3 !text-sm border-gray-200 text-gray-600 hover:text-orange-600">
                分享此模块
              </Button>
            </header>

            <div className="flex-1 p-4 md:p-6 overflow-hidden">
              {activeTab === 'json' && <JsonToolkit showToast={showToast} />}
              {activeTab === 'json-diff' && <JsonDiff showToast={showToast} />}
              {activeTab === 'xml' && <XmlToolkit showToast={showToast} />}
              {activeTab === 'xml-diff' && <XmlDiff showToast={showToast} />}
              {activeTab === 'sql' && <SqlValidator showToast={showToast} />}
              {activeTab === 'java' && <JsonToJava showToast={showToast} />}
              {activeTab === 'git' && <GitBranchGenerator showToast={showToast} />}
              
              {/* 3. 在路由渲染区注入我们新写的正则组件 */}
              {activeTab === 'regex' && <RegexTester showToast={showToast} />}
              {activeTab === 'text-replace' && <TextReplacer showToast={showToast} />}
              {activeTab === 'tools' && <DevTools showToast={showToast} />}
              {activeTab === 'ref' && <DevReference showToast={showToast} />}
            </div>
          </main>

          {toast && (
            <Toast 
              key={toast.id} 
              message={toast.message} 
              type={toast.type} 
              onClose={() => setToast(null)} 
            />
          )}

          <ChangelogModal isOpen={isChangelogOpen} onClose={() => setIsChangelogOpen(false)} />

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
